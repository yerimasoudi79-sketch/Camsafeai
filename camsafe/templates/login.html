{% extends "base.html" %}
{% block title %}Connexion{% endblock %}
{% block content %}
<div class="container">
  <div class="page-hero">
    <h1>Connexion</h1>
    <p>Accède à ton tableau de bord et à ton historique d'analyses.</p>
  </div>

  <div class="form-panel">
    <form method="POST">
      <div class="form-group">
        <label for="email">Adresse email</label>
        <input type="email" id="email" name="email" required placeholder="toi@exemple.com">
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Se connecter</button>
    </form>
    <div class="form-foot">
      Pas encore de compte ? <a href="{{ url_for('register') }}">Créer un compte</a>
    </div>
  </div>
</div>
{% endblock %}
