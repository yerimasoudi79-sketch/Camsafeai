{% extends "base.html" %}
{% block title %}Créer un compte{% endblock %}
{% block content %}
<div class="container">
  <div class="page-hero">
    <h1>Créer un compte</h1>
    <p>Rejoins la communauté CAMSAFE AI et commence à protéger tes échanges numériques.</p>
  </div>

  <div class="form-panel">
    <form method="POST">
      <div class="form-group">
        <label for="name">Nom complet</label>
        <input type="text" id="name" name="name" required placeholder="Ton nom">
      </div>
      <div class="form-group">
        <label for="email">Adresse email</label>
        <input type="email" id="email" name="email" required placeholder="toi@exemple.com">
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" required placeholder="Choisis un mot de passe">
      </div>
      <div class="form-group">
        <label for="role">Profil</label>
        <select id="role" name="role">
          <option value="citoyen">Citoyen</option>
          <option value="entreprise">Entreprise / PME</option>
          <option value="administration">Administration publique</option>
          <option value="etudiant">Étudiant / École</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Créer mon compte</button>
    </form>
    <div class="form-foot">
      Déjà inscrit ? <a href="{{ url_for('login') }}">Se connecter</a>
    </div>
  </div>
</div>
{% endblock %}
